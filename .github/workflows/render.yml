name: render

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/render.yml"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run smoke

      - run: npm run render -- --scene torusknot --frames 24 --fps 12 --bg "#0d1117" --color "#39d353" --out assets/torusknot.svg

      - run: npm run render -- --scene icosahedron --frames 24 --fps 12 --bg "#0d1117" --color "#58a6ff" --out assets/icosahedron.svg

      - run: npm run render -- --scene torus --frames 24 --fps 12 --bg "#0d1117" --color "#f778ba" --out assets/torus.svg

      - run: npm run update-readme

      # Artifacts are deterministic (same input -> same output), so when there's no diff nothing is committed or re-triggered.
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate scene SVGs"
          file_pattern: "assets/*.svg README.md"
